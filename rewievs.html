<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Whisper - Відгуки</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="site-layout.css">
    <script src="site-layout.js" defer></script>
    <script src="rewievs.js" defer></script>
</head>
<body>
    <main class="container">
        <section class="reviews-top">
            <div class="title-group">
                <h1>відгуки</h1>
                <div class="main-stars">★★★★★</div>
            </div>
            <div class="slider-arrows" aria-hidden="true">
                <button class="arrow" type="button">←</button>
                <button class="arrow" type="button">→</button>
            </div>
        </section>

        <section class="reviews-grid" id="reviews-container"></section>

        <section class="form-wrapper">
            <div class="review-form-card">
                <h2>Залишити відгук</h2>
                <form id="reviewForm">
                    <input type="text" id="userName" placeholder="Ваше ім'я" required>
                    <textarea id="userText" placeholder="Ваш відгук" required></textarea>
                    <button type="submit" class="publish-btn">Опублікувати</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
