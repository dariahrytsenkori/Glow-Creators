<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення запису | Beauty Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #612a26;
            --bg-color: #fcfcfc;
            --text-dark: #2c2c2c;
            --text-gray: #8b8b8b;
            --border-color: #e8e8e8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 24px;
            box-sizing: border-box;
        }

        .checkout-container {
            background: white;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--main-color);
        }

        .order-summary {
            background: #fdfaf9;
            padding: 20px;
            border-radius: 15px;
            margin: 30px 0;
        }

        .summary-line,
        .summary-total {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-total {
            border-top: 1px solid #eee;
            padding-top: 12px;
            margin-top: 12px;
            margin-bottom: 0;
            font-weight: 700;
            font-size: 18px;
            color: var(--main-color);
        }

        .empty-cart {
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
            margin: 0;
        }

        .btn-confirm {
            width: 100%;
            background-color: var(--main-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-confirm:hover:not(:disabled) {
            background-color: #4a1f1c;
            transform: translateY(-1px);
        }

        .btn-confirm:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>Підтвердження запису</h2>

    <form id="checkout-form">
        <div class="form-group">
            <label for="cust-name">Ваше ім'я</label>
            <input type="text" id="cust-name" placeholder="Введіть ім'я" required>
        </div>

        <div class="form-group">
            <label for="cust-phone">Номер телефону</label>
            <input type="tel" id="cust-phone" placeholder="+380" required>
        </div>

        <div class="form-group">
            <label for="cust-email">Email для квитанції</label>
            <input type="email" id="cust-email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="payment-method">Спосіб оплати</label>
            <select id="payment-method">
                <option value="cash">Готівкою в салоні</option>
                <option value="card">Карткою онлайн LiqPay</option>
            </select>
        </div>

        <div class="order-summary" id="summary-box"></div>

        <button type="submit" class="btn-confirm">Підтвердити запис</button>
    </form>

    <a href="cart.html" class="back-link">Повернутися до кошика</a>
</div>

<script>
    const checkoutForm = document.getElementById('checkout-form');
    const submitButton = document.querySelector('.btn-confirm');
    const summaryBox = document.getElementById('summary-box');

    function getCart() {
        return JSON.parse(localStorage.getItem('cart')) || [];
    }

    function calculateDiscount(rawSum) {
        if (rawSum > 10000) return 15;
        if (rawSum >= 5001) return 10;
        if (rawSum >= 2001) return 7;
        if (rawSum > 0) return 3;
        return 0;
    }

    function renderSummary() {
        const cart = getCart();
        const rawSum = cart.reduce((sum, item) => sum + (parseInt(item.price, 10) || 0), 0);
        const discountPercent = calculateDiscount(rawSum);
        const discountAmount = Math.round((rawSum * discountPercent) / 100);
        const finalSum = Math.max(rawSum - discountAmount, 0);

        if (cart.length === 0) {
            summaryBox.innerHTML = '<p class="empty-cart">Кошик порожній</p>';
            submitButton.disabled = true;
            return 0;
        }

        summaryBox.innerHTML = `
            <div class="summary-line">
                <span>Кількість послуг:</span>
                <span>${cart.length}</span>
            </div>
            <div class="summary-line">
                <span>Сума без знижки:</span>
                <span>${rawSum} грн</span>
            </div>
            <div class="summary-line">
                <span>Знижка (${discountPercent}%):</span>
                <span>-${discountAmount} грн</span>
            </div>
            <div class="summary-total">
                <span>До сплати:</span>
                <span>${finalSum} грн</span>
            </div>
        `;

        submitButton.disabled = false;
        return finalSum;
    }

    function submitLiqPayForm(data, signature) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://www.liqpay.ua/api/3/checkout';
        form.acceptCharset = 'utf-8';
        form.referrerPolicy = 'no-referrer';

        const dataInput = document.createElement('input');
        dataInput.type = 'hidden';
        dataInput.name = 'data';
        dataInput.value = data;
        form.appendChild(dataInput);

        const signatureInput = document.createElement('input');
        signatureInput.type = 'hidden';
        signatureInput.name = 'signature';
        signatureInput.value = signature;
        form.appendChild(signatureInput);

        document.body.appendChild(form);
        form.submit();
    }

    function submitServerPaymentForm(orderId, amount, description) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/pay-redirect';

        [
            ['orderId', orderId],
            ['amount', amount],
            ['description', description]
        ].forEach(([name, value]) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            input.value = value;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    }

    async function confirmOrder(event) {
        event.preventDefault();

        const cart = getCart();
        const amount = renderSummary();
        const paymentMethod = document.getElementById('payment-method').value;
        const customer = {
            name: document.getElementById('cust-name').value.trim(),
            phone: document.getElementById('cust-phone').value.trim(),
            email: document.getElementById('cust-email').value.trim()
        };

        if (!customer.name || !customer.phone || !customer.email) {
            alert('Введіть імʼя, номер телефону та email.');
            return;
        }

        if (!customer.email.includes('@')) {
            alert('Введіть коректний email для квитанції.');
            return;
        }

        if (!cart.length || amount <= 0) {
            alert('Кошик порожній.');
            return;
        }

        if (paymentMethod === 'cash') {
            alert('Запис створено. Оплата готівкою в салоні.');
            localStorage.removeItem('cart');
            window.location.href = 'history.html';
            return;
        }

        try {
            submitButton.disabled = true;
            submitButton.innerText = 'Переходимо до оплати...';

            const orderId = `BW_${Date.now()}`;
            const description = `Beauty Whisper: ${cart.map((item) => item.name).join(', ')}`;

            localStorage.setItem('pendingOrder', JSON.stringify({
                orderId,
                amount,
                customer,
                cart,
                createdAt: new Date().toISOString()
            }));

            submitServerPaymentForm(orderId, amount, description);
        } catch (error) {
            console.error('Payment error:', error);
            alert(`Помилка оплати: ${error.message}`);
            submitButton.disabled = false;
            submitButton.innerText = 'Підтвердити запис';
        }
    }

    checkoutForm.addEventListener('submit', confirmOrder);
    window.addEventListener('DOMContentLoaded', renderSummary);
</script>

</body>
</html>
