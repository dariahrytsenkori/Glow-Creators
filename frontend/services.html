        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 50px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }
        
        .card { position: relative; height: 500px; border-radius: 40px; overflow: hidden; background-size: cover; background-position: center; display: flex; align-items: flex-end; transition: 0.3s; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        .book-btn { padding: 10px 20px; border-radius: 12px; border: none; background: white; color: var(--main-color); font-weight: 700; cursor: pointer; font-size: 13px; }

        .set-card .price { font-size: 26px; color: var(--main-color); font-weight: 700; margin: 20px 0; }

   <script>

        { cat: 'Нігті', name: 'Гігієнічний манікюр', price: 600, time: '60 хв', desc: 'Комбінований або апаратний манікюр з професійним доглядом за кутикулою.', type: 'individual', img: 'img/IMG_0796.JPG' },

        { cat: 'Нігті', name: 'Нарощення 5-6 довжина', price: 1500, time: '180-240 хв', desc: 'Бажана довжина та ідеальна форма нігтів.', type: 'individual', img: 'img/IMG_0798.JPG' },
        { cat: 'Нігті', name: 'Гігієнічний педикюр', price: 900, time: '60 хв', desc: 'Професійний апаратний або комбінований догляд за стопами.', type: 'individual', img: 'img/IMG_0802.JPG' },
        { cat: 'Нігті', name: 'Педикюр з покриттям', price: 1100, time: '90-120 хв', desc: 'Гігієнічний догляд та ідеальне нанесення стійкого покриття.', type: 'individual', img: 'img/IMG_0803.JPG' },

        // ВОЛОССЯ
        { cat: 'Волосся', name: 'Стрижка жіноча', price: 500, time: '60 хв', desc: 'Моделювання ідеальної форми, що підкреслює ваші риси.', type: 'individual', img: 'img/IMG_0792 (5).JPG' },
        { cat: 'Волосся', name: 'Денна укладка', price: 1000, time: '45-60 хв', desc: 'Надання об’єму за допомогою фену та професійних щіток.', type: 'individual', img: 'img/IMG_0792 (3).JPG' },
        { cat: 'Волосся', name: 'Вечірня зачіска', price: 1500, time: '90-120 хв', desc: 'Вишуканий вечірній образ: голлівудська хвиля або текстурні пучки.', type: 'individual', img: 'img/IMG_0799.JPG' },
        { cat: 'Волосся', name: 'Весільний стайлінг', price: 2500, time: '120-180 хв', desc: 'Преміальний догляд та створення стійкого образу нареченої.', type: 'individual', img: 'img/IMG_0792.JPG' },
        { cat: 'Волосся', name: 'Авторське плетіння', price: 900, time: '40-80 хв', desc: 'Від лаконічних колосків до складних технік.', type: 'individual', img: 'img/IMG_0797.JPG' },
        { cat: 'Волосся', name: 'SPA-відновлення', price: 800, time: '60-90 хв', desc: 'Глибоке живлення та релакс-масаж для блиску волосся.', type: 'individual', img: 'img/IMG_0792 (4).JPG' },
        { cat: 'Волосся', name: 'Холодне відн. 1-2 довж.', price: 1700, time: '45-60 хв', desc: 'Живлення структури без термічного впливу.', type: 'individual', img: 'img/IMG_0790.JPG' },
        { cat: 'Волосся', name: 'Холодне відн. 3-4 довж.', price: 1900, time: '60-90 хв', desc: 'Живлення структури без термічного впливу.', type: 'individual', img: 'img/IMG_0790.JPG' },
        { cat: 'Волосся', name: 'Холодне відн. 5-6 довж.', price: 2200, time: '90-120 хв', desc: 'Живлення структури без термічного впливу.', type: 'individual', img: 'img/IMG_0790.JPG' },
        { cat: 'Волосся', name: 'Кератин 1-2 довжина', price: 2200, time: '90-120 хв', desc: 'Професійне вирівнювання структури волосся.', type: 'individual', img: 'img/IMG_0804.JPG' },
        { cat: 'Волосся', name: 'Кератин 3-4 довжина', price: 2400, time: '180-210 хв', desc: 'Професійне вирівнювання структури волосся.', type: 'individual', img: 'img/IMG_0804.JPG' },
        { cat: 'Волосся', name: 'Кератин 5-6 довжина', price: 2600, time: '240-300 хв', desc: 'Професійне вирівнювання структури волосся.', type: 'individual', img: 'img/IMG_0804.JPG' },
        { cat: 'Волосся', name: 'Фарбування 1-2 довжина', price: 1700, time: '90-120 хв', desc: 'Створення індивідуального образу та глибини кольору.', type: 'individual', img: 'img/IMG_0800.JPG' },
        { cat: 'Волосся', name: 'Фарбування 3-4 довжина', price: 1900, time: '150-180 хв', desc: 'Створення індивідуального образу та глибини кольору.', type: 'individual', img: 'img/IMG_0800.JPG' },
        { cat: 'Волосся', name: 'Фарбування 5-6 довжина', price: 2200, time: '210-240 хв', desc: 'Створення індивідуального образу та глибини кольору.', type: 'individual', img: 'img/IMG_0800.JPG' },

        // МАКІЯЖ
        { cat: 'Макіяж', name: 'Макіяж "Nude"', price: 800, time: '45 хв', desc: 'Підкреслюємо вашу природну красу та свіжість.', type: 'individual', img: 'img/IMG_0801.JPG' },
        { cat: 'Макіяж', name: 'Вечірній макіяж', price: 1500, time: '90 хв', desc: 'Виразні акценти та професійний контуринг.', type: 'individual', img: 'img/IMG_0795.JPG' },
        { cat: 'Макіяж', name: 'Весільний макіяж', price: 2100, time: '120 хв', desc: 'Стійкий та ніжний макіяж преміальними продуктами.', type: 'individual', img: 'img/IMG_0794.JPG' },

        // СЕТИ
        { cat: 'Сети', name: 'Morning Glow', price: 1200, time: '70 хв', desc: 'Денна укладка та ніжний Nude макіяж.', type: 'sets' },
        { cat: 'Сети', name: 'Event Ready', price: 2100, time: '150 хв', desc: 'Вишукана зачіска та вечірній макіяж.', type: 'sets' },
        { cat: 'Сети', name: 'Total Luxury', price: 2600, time: '180 хв', desc: 'Відновлення волосся та манікюр у 4 руки.', type: 'sets' }
    ];

    let currentMode = 'individual';
    let currentCategory = 'Всі';

    // 2. Ініціалізація пошуку (тільки після того, як DOM завантажився)
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', applyFilters);
        }
        applyFilters(); // Початковий запуск
    });

    function setMode(m) {
        currentMode = m;
        document.getElementById('btnIndiv').classList.toggle('active', m === 'individual');
        document.getElementById('btnSets').classList.toggle('active', m === 'sets');
        const filterBar = document.getElementById('filterBar');
        if (filterBar) filterBar.style.display = (m === 'sets') ? 'none' : 'flex';
        applyFilters();
    }

    function filterData(cat, btn) {
        if (btn) {
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        currentCategory = cat;
        applyFilters();
    }

    function applyFilters() {
        const searchInput = document.getElementById('searchInput');
        const query = searchInput ? searchInput.value.toLowerCase().trim() : "";
        
        const filtered = services.filter(s => {
            const matchMode = s.type === currentMode;
            const matchCat = (currentCategory === 'Всі' || s.cat === currentCategory);
            const matchSearch = s.name.toLowerCase().includes(query) || s.desc.toLowerCase().includes(query);
            return matchMode && matchCat && matchSearch;
        });

        render(filtered);
    }

    function render(data) {
        const grid = document.getElementById('servicesGrid');
        if (!grid) return;

        if (data.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Нічого не знайдено</p>';
            return;
        }

        grid.innerHTML = data.map(s => `
            <div class="card" style="background-image: url('${s.img || ''}')">
                <span class="category-tag">${s.cat}</span>
                <div class="card-overlay">
                    <div>
                        <div class="card-header">
                            <h3>${s.name}</h3>
                            <div class="price-badge">${s.price} грн</div>
                        </div>
                        <p>${s.desc}</p>
                    </div>
                    <div class="card-footer">
                        <div class="time-info"><span>🕒</span> ${s.time}</div>
                        <button class="book-btn" onclick="addToCart('${s.name}', ${s.price})">Записатися</button>
                    </div>
                </div>
            </div>
        `).join('');
    }
 
    function addToCart(serviceName, price) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    const newItem = {
        id: Date.now(),
        name: serviceName,
        price: parseInt(price),
        date: "Дата уточнюється", // Можна додати вибір дати пізніше
        master: "Майстер не обраний"
    };

    cart.push(newItem);
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(`${serviceName} додано до кошика!`);
}
</script>
