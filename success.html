<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення підтверджено - Beauty Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fcfcfc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            max-width: 400px;
        }
        .icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        h1 { color: #612a26; font-size: 24px; margin-bottom: 15px; }
        p { color: #777; line-height: 1.6; margin-bottom: 30px; }
        .back-btn {
            background: #612a26;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
    <script src="i18n.js" defer></script>
</head>
<body>

    <div class="success-card">
        <div class="icon">✓</div>
        <h1>Готово!</h1>
        <p id="receipt-status">Ваш запис успішно підтверджено. Надсилаємо квитанцію на email.</p>
        <a href="services.html" class="back-btn">Повернутись до послуг</a>
    </div>

    <script>
        async function sendReceipt() {
            const status = document.getElementById('receipt-status');
            const rawOrder = localStorage.getItem('pendingOrder');

            if (!rawOrder) {
                status.textContent = 'Ваш запис підтверджено. Дані для email-квитанції не знайдені.';
                return;
            }

            try {
                const order = JSON.parse(rawOrder);
                const sentKey = `receiptSent:${order.orderId}`;

                if (localStorage.getItem(sentKey)) {
                    status.textContent = 'Ваш запис підтверджено. Квитанцію вже надіслано на email.';
                    return;
                }

                const response = await fetch('/api/send-receipt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order })
                });

                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Не вдалося надіслати квитанцію.');
                }

                localStorage.setItem(sentKey, 'true');
                localStorage.removeItem('cart');
                status.textContent = 'Ваш запис підтверджено. Квитанцію надіслано на email.';
            } catch (error) {
                console.error('Receipt send error:', error);
                status.textContent = 'Ваш запис підтверджено, але квитанцію не вдалося надіслати автоматично.';
            }
        }

        window.addEventListener('DOMContentLoaded', sendReceipt);
    </script>

</body>
</html>
