<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Вхід</h2>
                
                <form class="auth-form" id="loginForm" novalidate>
                    <div class="input-group">
                        <input type="email" id="loginField" placeholder="Логін" required>
                        <span class="error-text" id="loginFieldError"></span>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Пароль" required>
                        <span class="error-text" id="passwordError"></span>
                    </div>
                    
                    <button type="submit" class="submit-btn">Увійти</button>
                </form>

                <div class="form-links">
                    <a href="register.html">Створити аккаунт</a>
                    <a href="#">Забули пароль?</a>
                </div>

                <div class="social-divider">або увійти через</div>

                <div class="social-login">
                    <div class="social-icons">
                        <a href="#" class="social-btn fb" id="fb-login">
                            <svg viewBox="0 0 320 512"><path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/></svg>
                        </a>
                        <a href="#" class="social-btn google" id="google-login">
                            <svg viewBox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                        </a>
                        <a href="#" class="social-btn apple" id="apple-login">
                            <svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="customAlert" class="custom-alert">
        <div class="alert-content">
            <div class="alert-icon">✨</div>
            <h3>Вітаємо!</h3>
            <p id="alertMsg"></p>
            <button class="alert-btn" onclick="window.location.href='index.html'">Продовжити</button>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const modal = document.getElementById('customAlert');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Очищення помилок
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('input').forEach(el => el.classList.remove('input-error'));

            const email = document.getElementById('loginField').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Показуємо красиве вікно замість звичайного alert
                    document.getElementById('alertMsg').innerText = `Раді бачити вас знову, ${result.user.name}!`;
                    modal.classList.add('active'); 
                    modal.style.display = 'flex';
                } else {
                    // Показуємо помилку під полем
                    showError('loginField', result.message || 'Невірний логін або пароль');
                }
            } catch (err) {
                alert("Помилка зв'язку з сервером. Переконайтеся, що сервер запущено.");
            }
        });

        function showError(inputId, message) {
            const inputElement = document.getElementById(inputId);
            const errorElement = document.getElementById(inputId + 'Error');
            inputElement.classList.add('input-error');
            errorElement.textContent = message;
            errorElement.classList.add('active');
        }
    </script>
</body>
</html>
